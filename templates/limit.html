<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StepUp — Limit Reached</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p { color: #6b7280; font-size: 16px; line-height: 1.6; max-width: 420px; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="icon">&#9203;</div>
  <h1>Daily limit reached</h1>
  <p>You've generated 3 resumes today. Come back tomorrow to create more — it's still completely free.</p>
  <a href="/">Back to Home</a>
</body>
</html>
