<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StepUp — Build Your Resume</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #fff;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .container { max-width: 680px; margin: 0 auto; }
    .back { color: #6b7280; font-size: 14px; text-decoration: none; display: inline-block; margin-bottom: 28px; }
    .back:hover { color: #9ca3af; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: #6b7280; font-size: 15px; margin-bottom: 36px; }
    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6366f1;
      margin-bottom: 20px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #d1d5db;
      margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      background: #0f0f13;
      border: 1.5px solid #2d2d3d;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select, .field textarea:focus { border-color: #6366f1; }
    .field textarea { height: 90px; resize: vertical; }
    .field .hint { font-size: 12px; color: #4b5563; margin-top: 4px; }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { display: none; text-align: center; color: #6b7280; font-size: 14px; margin-top: 16px; }
    select option { background: #1a1a24; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">&#8592; Back</a>
    <h1>Build Your Resume</h1>
    <p class="subtitle">Fill in your info below — StepUp handles the rest.</p>

    <form method="POST" action="/build" onsubmit="handleSubmit(this)">

      <div class="card">
        <div class="card-title">Basic Info</div>
        <div class="row">
          <div class="field">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Jane Smith" value="{{ prefill.get('name', '') }}" required/>
          </div>
          <div class="field">
            <label>School Name</label>
            <input type="text" name="school" placeholder="Lincoln High School" value="{{ prefill.get('school', '') }}" required/>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Grade</label>
            <select name="grade">
              {% set g = prefill.get('grade', '9th') %}
              <option {% if g == '9th' %}selected{% endif %}>9th</option>
              <option {% if g == '10th' %}selected{% endif %}>10th</option>
              <option {% if g == '11th' %}selected{% endif %}>11th</option>
              <option {% if g == '12th' %}selected{% endif %}>12th</option>
            </select>
          </div>
          <div class="field">
            <label>GPA (if you want to include it)</label>
            <input type="text" name="gpa" placeholder="3.8 / 4.0" value="{{ prefill.get('gpa', '') }}"/>
          </div>
        </div>
        <div class="field">
          <label>What are you applying for?</label>
          <input type="text" name="applying_for" placeholder="Summer internship at a tech company, part-time job, college program..." value="{{ prefill.get('applying_for', '') }}" required/>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Activities & Involvement</div>
        <div class="field">
          <label>Activities, Clubs & Sports</label>
          <textarea name="activities" placeholder="Varsity soccer captain, robotics club (built an autonomous robot), student council treasurer, volunteered at food bank every Saturday..." required>{{ prefill.get('activities', '') }}</textarea>
          <div class="hint">Be specific — include your role, what you did, and any achievements.</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Skills & Experience</div>
        <div class="field">
          <label>Skills</label>
          <input type="text" name="skills" placeholder="Python, public speaking, Microsoft Office, video editing, Spanish..." value="{{ prefill.get('skills', '') }}" required/>
        </div>
        <div class="field">
          <label>Work or Volunteer Experience <span style="color:#4b5563;font-weight:400">(optional)</span></label>
          <textarea name="experience" placeholder="Mowed lawns for neighbors ($200/month), babysat for 3 families, helped coach youth soccer...">{{ prefill.get('experience', '') }}</textarea>
        </div>
        <div class="field">
          <label>Anything else to include? <span style="color:#4b5563;font-weight:400">(optional)</span></label>
          <textarea name="extra" placeholder="Awards, honors, projects, languages spoken...">{{ prefill.get('extra', '') }}</textarea>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Generate My Resume</button>
      <div class="loading" id="loading">AI is building your resume... this takes about 10 seconds.</div>
    </form>
  </div>

  <script>
    function handleSubmit(form) {
      document.getElementById("submitBtn").disabled = true;
      document.getElementById("submitBtn").textContent = "Generating...";
      document.getElementById("loading").style.display = "block";
    }
  </script>
</body>
</html>
